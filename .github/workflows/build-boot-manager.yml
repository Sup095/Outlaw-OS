name: Build Outlaw Boot Manager v1.0

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Outlaw Boot Manager ISO
        uses: docker://archlinux:latest
        with:
          entrypoint: /bin/bash
          args: >-
            -c "
              pacman -Syu --noconfirm &&
              pacman -S --noconfirm archiso git base-devel &&
              cd /github/workspace/outlaw-installer &&
              chmod +x build.sh &&
              ./build.sh
            "

      - name: Locate built ISO
        id: locate
        run: |
          ISO_PATH=$(find ./outlaw-installer/out -name "outlaw-boot-manager-v1.0.iso" | head -n 1)
          if [ -z "$ISO_PATH" ]; then
            echo "❌ No ISO found!"
            exit 1
          fi
          echo "iso_path=$ISO_PATH" >> $GITHUB_ENV
          echo "iso_name=$(basename $ISO_PATH)" >> $GITHUB_ENV

      - name: Generate SHA256 checksum
        run: |
          cd "$(dirname ${{ env.iso_path }})"
          sha256sum ${{ env.iso_name }} > ${{ env.iso_name }}.sha256

      - name: Upload ISO to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ env.iso_path }}
          asset_name: ${{ env.iso_name }}
          asset_content_type: application/x-iso9660-image

      - name: Upload SHA256 checksum
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ env.iso_path }}.sha256
          asset_name: ${{ env.iso_name }}.sha256
          asset_content_type: text/plain

      - name: Build Status
        run: echo "✅ Outlaw Boot Manager v1.0 ISO built and attached successfully!"
