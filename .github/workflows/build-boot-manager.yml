name: Build Outlaw Boot Manager v1.0

on:
  release:
    types: [created]

# Explicitly force all GitHub-maintained and third-party actions 
# to run on Node.js 24 to clear the deprecation warnings.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Outlaw Boot Manager ISO
        uses: docker://archlinux:latest
        with:
          entrypoint: /bin/bash
          args: >-
            -c "
              set -e &&
              pacman -Syu --noconfirm &&
              pacman -S --noconfirm archiso git base-devel &&
              cd /github/workspace/outlaw-installer &&
              chmod +x build.sh &&
              ./build.sh
            "

      - name: Locate built ISO
        id: locate
        run: |
          ISO_PATH=$(find ./outlaw-installer/out -name "outlaw-boot-manager-v1.0.iso" -type f | head -n 1)
          if [ -z "$ISO_PATH" ]; then
            echo "❌ ERROR: ISO was not created!"
            exit 1
          fi
          echo "iso_path=$ISO_PATH" >> $GITHUB_ENV
          echo "iso_name=$(basename $ISO_PATH)" >> $GITHUB_ENV

      - name: Generate SHA256 checksum
        run: |
          ISO_DIR=$(dirname "${{ env.iso_path }}")
          cd "$ISO_DIR"
          sha256sum "${{ env.iso_name }}" > "${{ env.iso_name }}.sha256"

      - name: Upload ISO and SHA256 to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.iso_path }}
            ${{ env.iso_path }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Status
        run: echo "✅ Outlaw Boot Manager v1.0 ISO built and attached successfully!"
